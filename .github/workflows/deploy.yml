name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${ { steps. deployment. outputs.page_url } }

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Environment Variables
        run: |
          echo "VITE_NAVER MAP_CLIENT ID=$VITE NAVER MAP CLIENT ID
          VITE KAKAO SDK JS KEY=$VITE KAKAO SDK JS KEY
          VITE SERVER URL=$VITE SERVER URL
          VITE_STATIC_ONLY=$VITE STATIC ONLY" >> .env
        env:
          VITE NAVER MAP_CLIENT_ID: ${ { secrets. VITE_NAVER_MAP_CLIENT_ID } }
          VITE KAKAO SDK JS KEY: $ { { secrets. VITE_KAKAO_SDK_JS_KEY } }
          VITE SERVER URL: $ {{ vars. VITE_SERVER_URL } }
          VITE_STATIC ONLY: ${ { vars. VITE_STATIC_ONLY } }

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./build"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4